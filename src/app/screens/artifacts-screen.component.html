<div class="screen meta-screen">
        <button class="btn btn-small screen-back" (click)="game.backToTitle()">← Zurück</button>
        <h2>Artefakte</h2>
        <div class="meta-summary">
          <span>🔮 {{ game.meta().splitter }} Splitter</span>
          <span>🟡 {{ game.meta().kerne }} Kerne</span>
        </div>
        <p class="hint">Freigeschaltete Artefakte kannst du vor jedem Run auswählen.</p>
        <div class="upgrade-list">
          @for (a of game.allArtifacts; track a.id) {
            <div class="upgrade-row" [class.owned-artifact]="game.ownsArtifact(a.id)">
              <span class="upgrade-icon">{{ a.icon }}</span>
              <div class="upgrade-info">
                <div class="upgrade-name">{{ a.name }}</div>

                <div class="upgrade-text">{{ a.text }}</div>
              </div>
              @if (game.ownsArtifact(a.id)) {
                <span class="owned-badge">✔ Freigeschaltet</span>
              } @else {
                <button class="btn btn-small" [disabled]="!game.canBuyArtifact(a)" (click)="game.buyArtifact(a)">
                  @if (a.costKerne) { 🟡 {{ a.costKerne }} } @else { 🔮 {{ a.costSplitter }} }
                </button>
              }
            </div>
          }
        </div>
      </div>
