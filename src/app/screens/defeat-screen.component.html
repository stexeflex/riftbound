<div class="screen end-screen">
        @if (game.endSurrendered()) {
          <h2>🏳️ Run aufgegeben</h2>
          <p>Du kehrst mit deiner bisherigen Beute zurück.</p>
        } @else {
          <h2>💀 Niederlage</h2>
          <p>Der Riss hat dich verschlungen … aber dein Fortschritt bleibt.</p>
        }
        <p class="hint">🔮 +{{ game.endSplitter() }} Splitter gesammelt</p>
        <div class="title-buttons">
          @if (game.mode() === 'campaign') {
            <button class="btn btn-primary" (click)="game.goTo('campaign')">Zur Kampagne</button>
          } @else {
            <button class="btn btn-primary" (click)="game.openDungeons()">Zu den Gebieten</button>

          }
          <button class="btn" (click)="game.goTo('meta')">Upgrade-Shop</button>
          <button class="btn" (click)="game.backToTitle()">Zum Titel</button>
        </div>
      </div>
