<div class="screen meta-screen">
        <button class="btn btn-small screen-back" (click)="game.backToTitle()">← Zurück</button>
        <h2>Resonanzshop</h2>
        <div class="meta-summary">
          <span>🔮 {{ game.meta().splitter }} Splitter</span>
        </div>
        <p class="hint">
          Kaufe Resonanzen dauerhaft und wähle vor jedem Run eine davon aus.
        </p>
        <div class="upgrade-list">
          @for (r of game.allResonances; track r.id) {
            <div class="upgrade-row resonance-shop-row" [class.owned-artifact]="game.ownsResonance(r.id)">
              <span class="upgrade-icon">{{ r.icon }}</span>
              <div class="upgrade-info">
                <div class="upgrade-name">{{ r.name }}</div>
                <div class="upgrade-text">{{ r.text }}</div>
              </div>
              @if (game.ownsResonance(r.id)) {
                <span class="owned-badge">✔ Freigeschaltet</span>
              } @else {
                <button class="btn btn-small" [disabled]="!game.canBuyResonance(r)" (click)="game.buyResonance(r)">
                  🔮 {{ r.costSplitter }}
                </button>
              }
            </div>
          }
        </div>
      </div>
