<div class="screen meta-screen converter-screen">
  <button class="btn btn-small screen-back" (click)="game.backToTitle()">← Zurück</button>
  <h2>Umwandler</h2>
  <div class="meta-summary">
    <span>🔮 {{ game.meta().splitter }} Splitter</span>
    <span>🟡 {{ game.meta().kerne }} Kerne</span>
  </div>
  <p class="hint">
    Fester Kurs: 1 Kern wird zu 1.000 Splittern.
    Splitter lassen sich nicht in Kerne tauschen.
  </p>

  <div class="converter-options">
    <section class="converter-card">
      <span class="converter-icon">🔮</span>
      <h3>Splitter herstellen</h3>
      <p>1 Kern wird zu 1.000 Splittern.</p>
      <button
        class="btn btn-primary"
        [disabled]="!game.canConvertKernToSplitter()"
        (click)="game.convertKernToSplitter()"
      >
        🟡 1 → 🔮 1.000
      </button>
    </section>
  </div>
</div>
