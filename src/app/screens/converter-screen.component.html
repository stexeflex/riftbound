<div class="screen meta-screen converter-screen">
  <button class="btn btn-small screen-back" (click)="game.backToTitle()">← Zurück</button>
  <h2>Umwandler</h2>
  <div class="meta-summary">
    <span>🔮 {{ game.meta().splitter }} Splitter</span>
    <span>🟡 {{ game.meta().kerne }} Kerne</span>
  </div>
  <p class="hint">
    Fester Kurs: 1.000 Splitter werden zu 1 Kern.
    Kerne lassen sich nicht zurück in Splitter tauschen.
  </p>

  <div class="converter-options">
    <section class="converter-card">
      <span class="converter-icon">🟡</span>
      <h3>Kern herstellen</h3>
      <p>1.000 Splitter werden zu 1 Kern.</p>
      <button
        class="btn btn-primary"
        [disabled]="!game.canConvertSplitterToKern()"
        (click)="game.convertSplitterToKern()"
      >
        🔮 1.000 → 🟡 1
      </button>
    </section>
  </div>
</div>
